<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Química Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>🧪 Química Pro</h1>
    <p>Plataforma Educativa Interactiva</p>
</header>

<nav>
    <a href="#inicio">Inicio</a>
    <a href="#tabla">Elementos</a>
    <a href="#quiz">Quiz</a>
</nav>

<section id="inicio" class="hero">
    <h2>Explora el Mundo de la Química</h2>
    <p>Aprende elementos, responde preguntas y mejora tus conocimientos.</p>
</section>

<section id="tabla">
    <h2>Elementos Químicos</h2>
    <input type="text" id="buscador" placeholder="Buscar elemento...">
    <div id="elementos"></div>
</section>

<section id="quiz">
    <h2>Quiz de Química</h2>
    <div id="pregunta"></div>
    <div id="opciones"></div>
    <p id="resultado"></p>
</section>

<footer>
    Proyecto Profesional de Química © 2026
</footer>

<script src="script.js"></script>
</body>
</html>
